# Model configurations for the three classification architectures

models:
  gpt-4o:
    provider: "openai"
    model_name: "gpt-4o"
    temperature: 0.0
    max_tokens: 2048
    classification_type: "generative"
    batch_size: 10
    rate_limit_rpm: 500
    cost_per_1k_input_tokens: 0.005
    cost_per_1k_output_tokens: 0.015

  llama:
    provider: "local"
    model_name: "meta-llama/Meta-Llama-3.1-8B-Instruct"
    temperature: 0.0
    max_tokens: 2048
    classification_type: "generative"
    batch_size: 8
    device: "cuda"
    quantization: "4bit"

  bertimbau:
    provider: "local"
    model_name: "neuralmind/bert-base-portuguese-cased"
    classification_type: "fine-tuned"
    max_length: 512
    batch_size: 32
    learning_rate: 2.0e-5
    epochs: 10
    warmup_ratio: 0.1
    device: "cuda"
    num_labels: 6
